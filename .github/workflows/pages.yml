name: Build and deploy candidate vision
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-lato
          python -m pip install --upgrade pip
          python -m pip install reportlab==4.4.4
      - name: Build candidate PDFs
        run: python scripts/build_pdfs.py
      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pdfs/*.pdf
          if ! git diff --cached --quiet; then
            git commit -m "Generate candidate PDFs [skip ci]"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
